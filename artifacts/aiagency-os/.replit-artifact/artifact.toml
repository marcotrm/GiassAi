kind = "web"
previewPath = "/"
title = "AIAgency OS"
version = "1.0.0"
id = "artifacts/aiagency-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23057

[services.development]
run = "pnpm --filter @workspace/aiagency-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aiagency-os", "run", "build" ]
publicDir = "artifacts/aiagency-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23057"
BASE_PATH = "/"
