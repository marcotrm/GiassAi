kind = "mobile"
previewPath = "/mobile/"
title = "GiassAi Mobile"
version = "1.0.0"
id = "artifacts/giassai-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25959

[services.development]
run = "pnpm --filter @workspace/giassai-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/giassai-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/giassai-mobile", "run", "serve" ]

[services.env]
PORT = "25959"
BASE_PATH = "/mobile/"
